podcast:
  name: "Morning Briefing"
  schedule: "0 7 * * *"
  target_length_minutes: 1

sources:
  - name: "Hacker News"
    kind: rss
    url: "https://hnrss.org/frontpage"
  - name: "TechCrunch"
    kind: rss
    url: "https://techcrunch.com/feed/"

hosts:
  - name: "Alex"
    personality: "Curious tech enthusiast who asks good follow-up questions and gets excited about breakthrough ideas"
    voice_id: "af_heart"
    voice_provider: "kokoro"
  - name: "Sam"
    personality: "Dry humor, skeptical, always looks for the business angle and practical implications"
    voice_id: "am_michael"
    voice_provider: "kokoro"

providers:
  summarizer:
    provider: gemini
    model: gemini-3-flash-preview
  script_writer:
    provider: gemini
    model: gemini-3-pro-preview
  speech:
    provider: kokoro

destinations:
  - kind: file
    path: "./output"
