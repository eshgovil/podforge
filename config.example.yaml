podcast:
  name: "Morning Briefing"
  schedule: "0 7 * * *"
  target_length_minutes: 1

  # Show prompt — controls the overall personality, style, and structure of
  # your podcast. Leave blank for sensible defaults.
  show_prompt: |
    You are producing a fast-paced, opinionated tech news show.
    Keep each topic under 2 minutes. Prioritize stories that are
    surprising or have real-world impact. Skip anything that's
    just hype. The tone should be smart and fun, not dry.

sources:
  - name: "Hacker News"
    kind: rss
    url: "https://hnrss.org/frontpage"
  - name: "TechCrunch"
    kind: rss
    url: "https://techcrunch.com/feed/"
  # Web page sources extract text content from HTML pages
  # - name: "Stratechery"
  #   kind: web_page
  #   url: "https://stratechery.com/some-article/"

hosts:
  - name: "Alex"
    personality: "Curious tech enthusiast who asks good follow-up questions and gets excited about breakthrough ideas"
    voice_id: "af_heart"
    voice_provider: "kokoro"
  - name: "Sam"
    personality: "Dry humor, skeptical, always looks for the business angle and practical implications"
    voice_id: "am_michael"
    voice_provider: "kokoro"

providers:
  summarizer:
    provider: gemini
    model: gemini-3-flash-preview
  script_writer:
    provider: gemini
    model: gemini-3-pro-preview
  speech:
    provider: kokoro

destinations:
  - kind: file
    path: "./output"
